name: api-sync

on:
  repository_dispatch:
    types: [gateway-release]
  workflow_dispatch:
    inputs:
      gateway_tag:
        description: Gateway tag to sync (e.g. v0.3.0)
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: derive gateway tag
        id: tag
        run: |
          tag="${{ github.event.client_payload.gateway_tag || inputs.gateway_tag }}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
      - name: sync spec
        run: node scripts/sync-spec.mjs ${{ steps.tag.outputs.tag }}
      - name: open PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: api-sync/${{ steps.tag.outputs.tag }}
          title: "chore(api): sync OpenAPI spec from gateway ${{ steps.tag.outputs.tag }}"
          body: |
            Automated sync of the gateway OpenAPI contract.

            - Gateway tag: `${{ steps.tag.outputs.tag }}`
            - Reviewer checklist:
              - [ ] `api/CHANGELOG.md` has an entry for every wire-shape change.
              - [ ] `MIN_GATEWAY_VERSION` bumped if required.
              - [ ] `test:contract` passes against staging.
          labels: api-sync
